name: EpicHost Auto Renew (With Hy2 Proxy)

on:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次
  workflow_dispatch: # 支持手动点击运行

jobs:
  renew-job:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检查仓库代码
        uses: actions/checkout@v3

      - name: 2. 初始化 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装 Playwright 与浏览器核心
        run: |
          pip install playwright
          playwright install chromium

      - name: 4. 下载并启动 Hysteria 2 客户端
        env:
          HY2_SERVER: ${{ secrets.HY2_SERVER }} # 你的Hy2服务器IP:端口
          HY2_AUTH: ${{ secrets.HY2_AUTH }}     # 你的Hy2密码/认证文本
        run: |
          echo "正在下载 Hysteria 2 官方 Linux 客户端..."
          wget -O hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria

          echo "正在生成 Hy2 配置文件..."
          cat <<EOF > hy2_config.yaml
          server: $HY2_SERVER
          auth: $HY2_AUTH
          socks5:
            listen: 127.0.0.1:1080
          tls:
            sni: panel.epichost.pl
            insecure: true # 允许自签证书，提高节点连接成功率
          EOF

          echo "正在后台启动 Hy2 代理隧道..."
          ./hysteria client -c hy2_config.yaml > hysteria.log 2>&1 &
          
          # 等待 3 秒确保隧道建立成功
          sleep 3
          echo "--- Hysteria 启动日志简要查看 ---"
          head -n 20 hysteria.log

      - name: 5. 执行续期脚本（通过本地 Hy2 转发）
        env:
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          # 💡 告诉 Python 脚本，直接走刚刚建立好的本地 Socks5 隧道
          PROXY_SERVER: socks5://127.0.0.1:1080
        run: python renew.py

      - name: 6. 错误截图归档（仅在失败时触发）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error.png
          retention-days: 7
