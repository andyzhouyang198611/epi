name: EpicHost Auto Renew

on:
  schedule:
    # 每天每小时自动运行一次。
    # 提示：GitHub Actions 的定时任务有时会有延迟，
    # 但因为你的服务器是 2 小时过期，每小时运行一次完全可以容错。
    - cron: '0 * * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上点击按钮手动运行，方便调试

jobs:
  renew-job:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Check out repository code
        uses: actions/checkout@v3

      - name: 2. Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Install Playwright and browser cores
        run: |
          pip install playwright
          playwright install chromium

      - name: 4. Execute renewal script
        env:
          # 从 GitHub 仓库的安全凭证（Secrets）中读取账号密码
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
        run: python renew.py

      # 💡 这里是新增的步骤：如果第 4 步（脚本执行）失败了，就上传 error.png
      - name: 5. Archive error screenshot (on failure only)
        if: failure() # 只有当前面的步骤失败时，才执行此步骤
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot # 在 GitHub Actions 页面显示的产物名称
          path: error.png        # 脚本生成的错误截图文件名
          retention-days: 7      # 截图保留 7 天，方便你查看为什么报错
